<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vex Wasm Demo</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: rgba(15, 23, 42, 0.78);
        --line: rgba(148, 163, 184, 0.25);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #22c55e;
        --accent-2: #38bdf8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans", "Avenir Next", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(56, 189, 248, 0.22), transparent 36%),
          radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.18), transparent 32%),
          linear-gradient(160deg, #020617 0%, #0f172a 55%, #111827 100%);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .shell {
        width: min(760px, 100%);
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--panel);
        backdrop-filter: blur(16px);
        box-shadow: 0 24px 90px rgba(2, 6, 23, 0.45);
        overflow: hidden;
      }

      .hero {
        padding: 28px 28px 18px;
        border-bottom: 1px solid var(--line);
      }

      .eyebrow {
        color: var(--accent-2);
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 12px;
        margin-bottom: 10px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 5vw, 44px);
        line-height: 1.04;
      }

      .sub {
        margin: 0;
        color: var(--muted);
        max-width: 58ch;
        line-height: 1.5;
      }

      .grid {
        display: grid;
        gap: 18px;
        padding: 24px 28px 28px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px;
        background: rgba(15, 23, 42, 0.55);
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 16px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        color: #052e16;
        background: linear-gradient(135deg, #4ade80, #38bdf8);
      }

      button.secondary {
        color: var(--text);
        background: rgba(148, 163, 184, 0.14);
        border: 1px solid var(--line);
      }

      pre {
        margin: 0;
        padding: 14px;
        min-height: 136px;
        border-radius: 14px;
        overflow: auto;
        background: rgba(2, 6, 23, 0.72);
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="eyebrow">Vex WebAssembly</div>
        <h1>Browser-side wasm exports, served from the build graph</h1>
        <p class="sub">
          This page loads the same `wasm_exports_demo.wasm` artifact that the CLI verification target uses.
          No fake demo layer, no copy-pasted numbers.
        </p>
      </section>
      <section class="grid">
        <div class="panel">
          <div class="controls">
            <button id="load-btn">Load Wasm</button>
            <button id="run-btn" class="secondary" disabled>Run Exports</button>
          </div>
        </div>
        <div class="panel">
          <pre id="log">ready: click "Load Wasm"</pre>
        </div>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
